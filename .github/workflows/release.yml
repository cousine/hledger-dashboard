name: Release

on:
  push:
    tags:
      - '[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. 0.1.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      actions: read
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.10.0

      - uses: actions/setup-node@v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify versions are in sync
        run: pnpm run version:check

      - run: pnpm run build

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          output-file: sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest release artifacts
        uses: actions/attest@v4.1.1
        with:
          subject-path: |
            manifest.json
            main.js
            styles.css

      - name: Attest SBOM
        uses: actions/attest@v4.1.1
        with:
          subject-path: |
            manifest.json
            main.js
            styles.css
          sbom-path: sbom.spdx.json

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          gh release create "$TAG" \
            manifest.json main.js styles.css sbom.spdx.json \
            --title "$TAG" \
            --generate-notes
